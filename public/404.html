<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpinPick</title>
    <script>
      // GitHub Pages SPA fallback — redirect to index preserving the path.
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace("/" + (path.startsWith("/") ? "" : "") + "?p=" + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
